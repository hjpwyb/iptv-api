name: 'Update schedule'

on:
  schedule:
    - cron: '30 */6 * * *'   # 每6小时的第30分触发
  workflow_dispatch:
    branches:
      - master
      - dev
      - gd

jobs:
  push:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      # 1. 设置分支名（Guovin 仓库用 gd，其他用 master）
      - name: Set branch name
        id: vars
        run: |
          if [[ "${{ github.repository_owner }}" == "Guovin" ]]; then
            echo "BRANCH_NAME=gd"
            echo "BRANCH_NAME=gd" >> $GITHUB_ENV
          else
            echo "BRANCH_NAME=master"
            echo "BRANCH_NAME=master" >> $GITHUB_ENV
          fi

      # 2. 检出对应分支代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      # 3. 设置 Python 3.13
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pipenv'

      # 4. 判断是否开启 open_driver
      - name: Check open_driver config
        id: check_driver
        run: |
          OPEN_DRIVER=$(python - <<'PY'
          try:
              from utils.config import config
              print("True" if config.open_driver else "False")
          except:
              print("False")
          PY
          )
          echo "OPEN_DRIVER=$OPEN_DRIVER" >> $GITHUB_ENV

      # 5 & 6. 需要浏览器时才安装 Chrome + ChromeDriver
      - name: Setup Chrome
        if: env.OPEN_DRIVER == 'True'
        uses: browser-actions/setup-chrome@latest

      - name: Setup ChromeDriver
        if: env.OPEN_DRIVER == 'True'
        uses: nanasess/setup-chromedriver@master

      # 7. 安装 FFmpeg
      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      # 8. 安装 pipenv
      - name: Install pipenv
        run: pip install --user pipenv

      # 9. 安装项目依赖
      - name: Install dependencies
        run: |
          pipenv --python 3.13
          pipenv install --deploy
          if [[ "${{ env.OPEN_DRIVER }}" == "True" ]]; then
            pipenv install selenium
          fi

      # 10. 执行更新脚本
      - name: Run update script
        run: pipenv run dev

      # 11. 提交并推送变更
      - name: Commit and push changes
        id: commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "无文件变更，跳过提交"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git commit -m "Github Action Auto Updated at $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin ${{ env.BRANCH_NAME }} --force
            echo "变更已提交并强制推送"
          fi

  # 新增：只有 push 完成后才触发同步
  trigger-sync:
    needs: push                     # 关键：必须等 push 完成后才运行
    if: needs.push.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'  # 有变更或手动触发时才同步
    runs-on: ubuntu-latest
    steps:
      - name: 触发外部同步
        run: |
          echo "开始触发同步..."
          curl -X GET "https://live.yuye.qzz.io/sync" \
               -f --silent --show-error \
               --max-time 180 \
               || echo "同步请求失败（可能是服务端问题）"
          echo "同步请求已发送"00000000000000000000000000000000000000000000
