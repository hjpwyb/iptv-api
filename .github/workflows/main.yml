name: 'Update schedule'

on:
  schedule:
    - cron: '30 */6 * * *'   # 设置定时触发（根据需求修改）
  workflow_dispatch:
    branches:
      - master
      - dev
      - gd

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: ['ubuntu-latest']
    steps:
      # 步骤 1: 设置分支名称
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      # 步骤 2: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ env.BRANCH_NAME }}

      # 步骤 3: 设置 Python 环境
      - name: Run with setup-python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      # 步骤 4: 检查 open_driver 配置（若需要，与你的配置文件相关）
      - name: Check open_driver config
        id: check_driver
        run: |
          echo "OPEN_DRIVER=$(python -c '
          try:
            from utils.config import config
            open_driver = config.open_driver
          except:
            open_driver = False
          print(open_driver)')" >> $GITHUB_ENV

      # 步骤 5: 设置 Chrome 浏览器（如果需要）
      - name: Set up Chrome
        if: env.OPEN_DRIVER == 'True'
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      # 步骤 6: 下载 ChromeDriver（如果需要）
      - name: Download chrome driver
        if: env.OPEN_DRIVER == 'True'
        uses: nanasess/setup-chromedriver@master

      # 步骤 7: 安装 FFmpeg（如果需要）
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 步骤 8: 安装 pipenv（Python 包管理工具）
      - name: Install pipenv
        run: pip3 install --user pipenv

      # 步骤 9: 安装依赖
      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      # 步骤 10: 安装 selenium（如果需要）
      - name: Install selenium
        if: env.OPEN_DRIVER == 'True'
        run: pipenv install selenium

      # 步骤 11: 运行更新（执行筛选操作或者你需要的其他操作）
      - name: Update
        run: pipenv run dev  # 这里是执行你需要的更新命令

      # 步骤 12: 检查文件差异并提交更新
      - name: Commit and push if changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .  # 添加所有变更的文件
          if ! git diff --staged --quiet; then
            git commit -m "Github Action Auto Updated"
            git push --force  # 推送到远程仓库
          fi

  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 触发 Worker 同步
        run: |
          curl -X GET "https://live.yuye.qzz.io/sync" \
               --fail --silent --show-error \
               --max-time 120   # 最多等 2 分钟
          
          echo "触发同步完成"
