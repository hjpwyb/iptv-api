name: 定时触发 Cloudflare Worker 同步

on:
  workflow_run:
    workflows: ["main.yml"]    # 监听 main.yml 完成
    types:
      - completed             # 当 main.yml 完成时触发

  workflow_dispatch:  # 允许手动触发
    description: 手动触发 Cloudflare Worker 同步

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 触发 Worker 同步
        run: |
          curl -X GET "https://live.yuye.qzz.io/sync" \
               --fail --silent --show-error \
               --max-time 120   # 最多等 2 分钟
          
          echo "触发同步完成"
