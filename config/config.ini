[Settings]

; =========================
; 全局功能开关
; =========================
open_update = True
open_empty_category = False
open_update_time = True
open_url_info = False
open_epg = True
open_m3u_result = True
urls_limit = 10
update_time_position = top
language = zh_CN


; =========================
; 定时执行设置
; =========================
update_mode = time
update_interval = 12
update_times =
update_startup = True
time_zone = Asia/Shanghai


; =========================
; 结果输出 & 服务
; =========================
source_file = config/demo.txt
final_file = output/result.txt
open_service = True
app_port = 5180
public_scheme = http
public_domain = 127.0.0.1
cdn_url =


; =========================
; 浏览器执行
; =========================
open_driver = False


; =========================
; 数据源总开关（只开酒店源）
; =========================
open_hotel = True
open_multicast = False
open_local = False
open_subscribe = False
open_online_search = False


; =========================
; 数据源工作模式（酒店）
; =========================
open_hotel_foodie = True
open_hotel_fofa = False

open_multicast_foodie = False
open_multicast_fofa = False

open_request = True
open_use_cache = False
open_history = False
open_headers = False


; =========================
; 过滤 & 测速
; =========================
open_speed_test = True
open_filter_resolution = True
open_filter_speed = True
open_supply = True

min_resolution = 1280x720
max_resolution = 3840x2160
min_speed = 0.5

speed_test_limit = 10
speed_test_timeout = 10
speed_test_filter_host = False

request_timeout = 10
recent_days = 30


; =========================
; 网络协议 & 地域偏好
; =========================
ipv4_num = 1
ipv6_num = 1
ipv6_support = False
ipv_type = all
ipv_type_prefer = auto
location =
isp =


; =========================
; 结果排序偏好
; =========================
origin_type_prefer = hotel


; =========================
; 本地源（已关闭，仅保留配置）
; =========================
local_file = config/local.txt
local_num = 0


; =========================
; 订阅源（已关闭）
; =========================
subscribe_num = 0


; =========================
; 酒店源配置（核心）
; =========================
hotel_num = 20
hotel_page_num = 2
hotel_region_list = all


; =========================
; 组播源（已关闭）
; =========================
multicast_num = 0
multicast_page_num = 0
multicast_region_list = all


; =========================
; 关键字搜索（已关闭）
; =========================
online_search_num = 0
online_search_page_num = 0


; =========================
; 频道台标
; =========================
logo_url = https://raw.githubusercontent.com/fanmingming/live/main/tv/
logo_type = png


; =========================
; RTMP 推流（可选，默认关闭）
; =========================
open_rtmp = False
nginx_http_port = 8080
nginx_rtmp_port = 1935
rtmp_idle_timeout = 300
rtmp_max_streams = 10
