[Settings]
; =========================
; 全局功能开关 / Global Switches
; =========================
open_update = True
open_empty_category = False
open_update_time = True
open_url_info = False
open_epg = True
open_m3u_result = True
urls_limit = 10
update_time_position = top
language = zh_CN

; =========================
; 定时执行设置 / Scheduled Execution Settings
; =========================
update_mode = time
update_interval = 12
update_times =
update_startup = True
time_zone = Asia/Shanghai

; =========================
; 结果输出 & 服务配置 / Output & Service
; =========================
source_file = config/demo.txt
final_file = output/result.txt
open_service = True
app_port = 5180
public_scheme = http
public_domain = 127.0.0.1
cdn_url =

; =========================
; 浏览器执行 / Browser Driver
; =========================
open_driver = False

; =========================
; 数据源总开关 / Source Global Switches
; =========================
open_hotel = True          ; 开启酒店源（核心）
open_multicast = False     ; 关闭组播源
open_local = False         ; 关闭本地源
open_subscribe = False     ; 关闭订阅源
open_online_search = False ; 关闭关键字搜索源

; =========================
; 数据源工作模式 / Source Working Modes
; =========================
open_hotel_foodie = True   ; 开启 Foodie 酒店源（推荐，抓取量大）
open_hotel_fofa = False    ; 可选开启 FOFA 酒店源
open_multicast_foodie = True
open_multicast_fofa = False
open_request = False
open_use_cache = False     ; 关闭缓存（避免旧数据）
open_history = False       ; 关闭历史结果合并（核心！只用本次新抓取）
open_headers = False

; =========================
; 过滤 & 测速设置 / Filtering & Speed Test
; =========================
open_speed_test = True
open_filter_resolution = True
open_filter_speed = True
open_supply = False        ; 关闭补偿机制（避免拉低质量旧链接）

min_resolution = 1280x720
max_resolution = 3840x2160
min_speed = 0.5            ; 可根据实际情况调高到 1.0~2.0
speed_test_limit = 10
speed_test_timeout = 10
speed_test_filter_host = False
request_timeout = 10
recent_days = 30           ; 可调小到 7~15

; =========================
; 网络协议 & 地域偏好 / Network & Region Preferences
; =========================
ipv4_num = 1
ipv6_num = 1
ipv6_support = False
ipv_type = all
ipv_type_prefer = auto
location =
isp =

; =========================
; 结果排序偏好 / Result Ordering Preference
; =========================
origin_type_prefer =

; =========================
; 本地源 / Local Source
; =========================
local_file = config/local.txt
local_num = 0              ; 完全不保留本地源

; =========================
; 订阅源 / Subscription Source
; =========================
subscribe_num = 0          ; 完全不保留订阅源

; =========================
; 酒店源 / Hotel Source
; =========================
hotel_num = 30             ; 大幅提高酒店源名额
hotel_page_num = 5         ; 增加分页抓更多（可根据性能调整 3~10）
hotel_region_list = all    ; all 为全国；特定省份示例：广东,江苏,浙江

; =========================
; 组播源 / Multicast Source
; =========================
multicast_num = 0          ; 完全不保留组播源
multicast_page_num = 1
multicast_region_list = all

; =========================
; 关键字搜索源 / Online Search Source
; =========================
online_search_num = 0
online_search_page_num = 1

; =========================
; 频道台标 / Channel Logo
; =========================
logo_url = https://raw.githubusercontent.com/fanmingming/live/main/tv/
logo_type = png

; =========================
; RTMP 推流 / RTMP Push
; =========================
open_rtmp = True
nginx_http_port = 8080
nginx_rtmp_port = 1935
rtmp_idle_timeout = 300
rtmp_max_streams = 10
