; 数据源总开关
open_hotel         = True       ; ← 必须开启酒店源总开关
open_local         = False      ; 关闭本地源（不想要就关）
open_subscribe     = False      ; 关闭订阅源（不想要就关）
open_multicast     = False      ; 关闭组播源（不想要就关）
open_online_search = False      ; 关闭关键字搜索源

; 酒店源具体模式（至少开一个）
open_hotel_foodie  = True       ; 推荐先开 Foodie 模式（抓取量大、质量好）
open_hotel_fofa    = False      ; FOFA 模式可选，抓得少一点

; 酒店源偏好数量（重点！调高它，结果里酒店源就会多）
hotel_num          = 20         ; 建议 15~30，越多酒店源越多（上限受 urls_limit 限制）

; 酒店源抓取范围
hotel_region_list  = all        ; "all" 为全部地区；想筛选特定地区可改成如：广东,上海,北京（用中文逗号分隔）
hotel_page_num     = 3          ; 分页数，建议 2~5，数值越大抓的酒店源越多（但更新时间会变长）

; 避免历史/缓存干扰（强烈建议）
open_history       = False      ; 不合并历史结果
open_use_cache     = False      ; 不使用旧缓存（酒店源特别重要）
open_supply        = False      ; 关闭补偿（避免拉低质量的旧链接进来）

; 其他推荐保持（保证质量）
open_filter_resolution = True
open_filter_speed      = True
min_speed              = 1.0    ; 可以适当调高，要求更快
min_resolution         = 1280x720
